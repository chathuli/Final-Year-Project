<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History - AI Breast Cancer Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">🏥 AI Cancer Detection</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/history">History</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="hero-section">
        <div class="container">
            <div class="medical-badge">
                <span>📋</span>
                <span>Prediction Records</span>
            </div>
            <h1 class="hero-title">Prediction History</h1>
            <p class="hero-subtitle">View all past predictions and analysis results</p>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row">
            <div class="col-lg-11 mx-auto">
                <div class="main-card">
                    <div class="card-header-custom">
                        <h3>📊 All Predictions</h3>
                        <p class="mb-0 mt-2 header-subtitle">Complete history of all predictions made by the system</p>
                    </div>
                    <div class="card-body-custom">
                        <div id="historyTable">
                            <div class="text-center py-5">
                                <div class="loading-spinner loading-spinner-large"></div>
                                <p class="mt-3">Loading prediction history...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="stethoscope-decoration"></div>
    <div class="medical-pattern"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load prediction history
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                
                if (data.predictions && data.predictions.length > 0) {
                    displayHistory(data.predictions);
                } else {
                    document.getElementById('historyTable').innerHTML = `
                        <div class="text-center py-5">
                            <h4>No predictions yet</h4>
                            <p class="text-muted">Make your first prediction to see it here</p>
                            <a href="/" class="btn btn-analyze mt-3">Make Prediction</a>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('historyTable').innerHTML = `
                    <div class="alert alert-danger">
                        <h4>Error loading history</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function displayHistory(predictions) {
            let html = `
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-header-gradient">
                            <tr>
                                <th>ID</th>
                                <th>Date & Time</th>
                                <th>Prediction</th>
                                <th>Confidence</th>
                                <th>Model</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            predictions.forEach(pred => {
                const badgeClass = pred.prediction === 'Benign' ? 'bg-success' : 'bg-danger';
                const date = new Date(pred.timestamp).toLocaleString();
                
                html += `
                    <tr>
                        <td><strong>#${pred.id}</strong></td>
                        <td>${date}</td>
                        <td><span class="badge ${badgeClass}">${pred.prediction}</span></td>
                        <td>${(pred.confidence * 100).toFixed(1)}%</td>
                        <td>${pred.model}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="downloadReport(${pred.id})">
                                📄 Download Report
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('historyTable').innerHTML = html;
        }

        async function downloadReport(predictionId) {
            try {
                window.location.href = `/api/generate-report/${predictionId}`;
            } catch (error) {
                alert('Error generating report: ' + error.message);
            }
        }

        // Load history on page load
        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
