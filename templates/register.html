<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Breast Cancer Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1C2B4A 0%, #1A73E8 50%, #0D9488 100%);
            background-size: 300% 300%;
            animation: bgShift 10s ease infinite;
            padding: 20px 0;
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: rgba(26,115,232,0.15);
            top: -150px; left: -150px;
            animation: orbMove 12s ease-in-out infinite;
        }
        .auth-container::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: rgba(13,148,136,0.15);
            bottom: -100px; right: -100px;
            animation: orbMove 15s ease-in-out infinite reverse;
        }
        @keyframes bgShift {
            0%,100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }
        @keyframes orbMove {
            0%,100% { transform: translate(0,0) scale(1); }
            50%      { transform: translate(40px,-40px) scale(1.1); }
        }
        .auth-card {
            background: rgba(235, 244, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.2);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: cardPop 0.7s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes cardPop {
            from { transform: scale(0.8) translateY(40px); opacity: 0; }
            to   { transform: scale(1) translateY(0);      opacity: 1; }
        }
        .auth-header {
            background: linear-gradient(135deg, #1A73E8 0%, #0D9488 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .auth-header::before {
            content: '';
            position: absolute;
            top: -50%; right: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            animation: headerGlow 4s ease-in-out infinite;
        }
        @keyframes headerGlow {
            0%,100% { transform: scale(1); opacity: 0.5; }
            50%      { transform: scale(1.2); opacity: 1; }
        }
        .auth-body {
            padding: 40px;
            background: linear-gradient(160deg, #EBF4FF 0%, #E8F5F3 100%);
        }
        .form-control {
            background: rgba(255,255,255,0.8);
            border: 2px solid #C7DCFF;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .form-control:hover {
            border-color: rgba(26,115,232,0.5);
            background: rgba(255,255,255,0.95);
        }
        .form-control:focus {
            border-color: #1A73E8;
            box-shadow: 0 0 0 4px rgba(26,115,232,0.15);
            background: white;
            transform: translateY(-2px);
        }
        select.form-control {
            cursor: pointer;
            font-weight: 500;
        }
        select.form-control option {
            padding: 10px;
            font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1A73E8 0%, #0D9488 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.5s ease;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,115,232,0.45); }
        .btn-primary:hover::before { left: 100%; }
        .password-strength {
            height: 5px;
            border-radius: 3px;
            margin-top: 5px;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus fa-3x mb-3"></i>
                <h2>Create Account</h2>
                <p class="mb-0">Join our breast cancer detection system as a Patient</p>
                <small style="opacity: 0.9; display: block; margin-top: 8px;">
                    👨‍⚕️ Doctors are registered by administrators
                </small>
            </div>
            <div class="auth-body">
                <div id="alert-container"></div>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="fullname" class="form-label">
                            <i class="fas fa-id-card"></i> Full Name
                        </label>
                        <input type="text" class="form-control" id="fullname" name="fullname" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" class="form-control" id="username" name="username" required 
                               pattern="[a-zA-Z0-9_]{3,20}" 
                               title="3-20 characters, letters, numbers, and underscores only">
                        <small class="text-muted">3-20 characters, letters, numbers, and underscores only</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required 
                               minlength="6">
                        <div class="password-strength" id="passwordStrength"></div>
                        <small class="text-muted">Minimum 6 characters</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">
                            <i class="fas fa-lock"></i> Confirm Password
                        </label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label" for="terms">
                            I agree to the terms and conditions
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                
                <div class="text-center">
                    <p class="mb-0">Already have an account? 
                        <a href="{{ url_for('login') }}" class="text-decoration-none">Sign in here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Password strength indicator
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            const strengthBar = document.getElementById('passwordStrength');
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            const colors = ['#dc3545', '#ffc107', '#28a745'];
            const widths = ['33%', '66%', '100%'];
            
            if (strength <= 2) {
                strengthBar.style.backgroundColor = colors[0];
                strengthBar.style.width = widths[0];
            } else if (strength <= 3) {
                strengthBar.style.backgroundColor = colors[1];
                strengthBar.style.width = widths[1];
            } else {
                strengthBar.style.backgroundColor = colors[2];
                strengthBar.style.width = widths[2];
            }
        });
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showAlert('Passwords do not match!', 'danger');
                return;
            }
            
            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: password,
                full_name: document.getElementById('fullname').value
                // No role - will default to 'user' on backend
            };
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Registration successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showAlert(data.error || 'Registration failed', 'danger');
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.', 'danger');
            }
        });
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
    </script>
</body>
</html>
