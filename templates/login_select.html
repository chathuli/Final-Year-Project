<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Breast Cancer Detection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1C2B4A 0%, #1A73E8 50%, #0D9488 100%);
            background-size: 300% 300%;
            animation: bgShift 10s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: rgba(26,115,232,0.12);
            top: -200px; left: -200px;
            animation: orbMove 14s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: rgba(13,148,136,0.12);
            bottom: -150px; right: -150px;
            animation: orbMove 18s ease-in-out infinite reverse;
        }
        @keyframes bgShift {
            0%,100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }
        @keyframes orbMove {
            0%,100% { transform: translate(0,0) scale(1); }
            50%      { transform: translate(50px,-50px) scale(1.15); }
        }
        .login-container {
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .header-section {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }
        @keyframes fadeInDown {
            from { transform: translateY(-30px); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }
        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .login-card {
            background: rgba(235, 244, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.2);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            cursor: pointer;
            text-align: center;
            height: 100%;
            border-top: 5px solid transparent;
            animation: cardPop 0.7s cubic-bezier(0.34,1.56,0.64,1) backwards;
        }
        .login-card:nth-child(1) { animation-delay: 0.1s; }
        .login-card:nth-child(2) { animation-delay: 0.2s; }
        .login-card:nth-child(3) { animation-delay: 0.3s; }
        @keyframes cardPop {
            from { transform: scale(0.8) translateY(40px); opacity: 0; }
            to   { transform: scale(1) translateY(0);      opacity: 1; }
        }
        .login-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 24px 64px rgba(0,0,0,0.3);
        }
        .login-card.admin  { border-top-color: #DC2626; }
        .login-card.doctor { border-top-color: #16A34A; }
        .login-card.user   { border-top-color: #1A73E8; }
        .login-icon { font-size: 4rem; margin-bottom: 20px; }
        .login-card.admin  .login-icon { color: #DC2626; }
        .login-card.doctor .login-icon { color: #16A34A; }
        .login-card.user   .login-icon { color: #1A73E8; }
        .login-card h3 { font-weight: 700; margin-bottom: 15px; color: #1C2B4A; }
        .login-card p  { color: #6B7280; margin-bottom: 20px; }
        .login-btn {
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
        }
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        .login-btn:hover::before { left: 100%; }
        .login-card.admin  .login-btn { background: #DC2626; color: white; }
        .login-card.doctor .login-btn { background: #16A34A; color: white; }
        .login-card.user   .login-btn { background: #1A73E8; color: white; }
        .login-btn:hover { transform: scale(1.08); color: white; box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header-section">
            <i class="fas fa-heartbeat fa-4x mb-3"></i>
            <h1>Breast Cancer Detection System</h1>
            <p>Select your login type to continue</p>
        </div>
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="login-card admin" onclick="window.location.href='/login/admin'">
                    <div class="login-icon">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h3>Admin Login</h3>
                    <p>System administration and management</p>
                    <a href="/login/admin" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Admin Login
                    </a>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="login-card doctor" onclick="window.location.href='/login/doctor'">
                    <div class="login-icon">
                        <i class="fas fa-user-md"></i>
                    </div>
                    <h3>Doctor Login</h3>
                    <p>Medical professional access</p>
                    <a href="/login/doctor" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Doctor Login
                    </a>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="login-card user" onclick="window.location.href='/login/user'">
                    <div class="login-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <h3>User Login</h3>
                    <p>Patient portal access</p>
                    <a href="/login/user" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> User Login
                    </a>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <p class="text-white">Don't have an account? <a href="/register" class="text-white fw-bold">Register here</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
