<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Breast Cancer Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1C2B4A 0%, #1A73E8 50%, #0D9488 100%);
            background-size: 300% 300%;
            animation: bgShift 10s ease infinite;
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: rgba(26,115,232,0.15);
            top: -150px; left: -150px;
            animation: orbMove 12s ease-in-out infinite;
        }
        .auth-container::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: rgba(13,148,136,0.15);
            bottom: -100px; right: -100px;
            animation: orbMove 15s ease-in-out infinite reverse;
        }
        @keyframes bgShift {
            0%,100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }
        @keyframes orbMove {
            0%,100% { transform: translate(0,0) scale(1); }
            50%      { transform: translate(40px,-40px) scale(1.1); }
        }
        .auth-card {
            background: rgba(235, 244, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.2);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: cardPop 0.7s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes cardPop {
            from { transform: scale(0.8) translateY(40px); opacity: 0; }
            to   { transform: scale(1) translateY(0);      opacity: 1; }
        }
        .auth-header {
            background: linear-gradient(135deg, #1A73E8 0%, #0D9488 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .auth-header::before {
            content: '';
            position: absolute;
            top: -50%; right: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            animation: headerGlow 4s ease-in-out infinite;
        }
        @keyframes headerGlow {
            0%,100% { transform: scale(1); opacity: 0.5; }
            50%      { transform: scale(1.2); opacity: 1; }
        }
        .auth-body {
            padding: 40px;
            background: linear-gradient(160deg, #EBF4FF 0%, #E8F5F3 100%);
        }
        .form-control {
            background: rgba(255,255,255,0.8);
            border: 2px solid #C7DCFF;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .form-control:hover {
            border-color: rgba(26,115,232,0.5);
            background: rgba(255,255,255,0.95);
        }
        .form-control:focus {
            border-color: #1A73E8;
            box-shadow: 0 0 0 4px rgba(26,115,232,0.15);
            background: white;
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #1A73E8 0%, #0D9488 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.5s ease;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,115,232,0.45); }
        .btn-primary:hover::before { left: 100%; }
        .login-options {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #C7DCFF;
        }
        .login-link {
            display: inline-block;
            margin: 5px 10px;
            color: #6B7280;
            text-decoration: none;
            transition: color 0.3s;
        }
        .login-link:hover { color: #1A73E8; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-heartbeat fa-3x mb-3"></i>
                <h2>User Login</h2>
                <p class="mb-0">Patient Access Portal</p>
            </div>
            <div class="auth-body">
                <div id="alert-container"></div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                
                <div class="text-center mb-3">
                    <p class="mb-0">Don't have an account? 
                        <a href="/register" class="text-decoration-none">Register here</a>
                    </p>
                </div>
                
                <div class="login-options text-center">
                    <p class="mb-2 text-muted">Other Login Options:</p>
                    <a href="/login/admin" class="login-link">
                        <i class="fas fa-user-shield"></i> Admin Login
                    </a>
                    <a href="/login/doctor" class="login-link">
                        <i class="fas fa-user-md"></i> Doctor Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect || '/';
                    }, 1000);
                } else {
                    showAlert(data.error || 'Login failed', 'danger');
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.', 'danger');
            }
        });
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
    </script>
</body>
</html>
